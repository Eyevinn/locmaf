name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekdays 08:00 UTC: re-scan unchanged code against the latest vuln
    # database, so a newly-disclosed dependency or stdlib CVE surfaces
    # even without a commit.
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Reachability-based scan: fails only on vulnerabilities this module
      # actually calls (dependencies and the Go stdlib). Vulns present but
      # unreachable are reported, not failed on.
      - name: Run govulncheck
        run: govulncheck ./...
