<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340"
     role="img" aria-label="Bar chart: CMAF moof total 26 040 bytes vs LOCMAF object total 592 bytes (45:1 compression).">
  <style>
    .title { font-family: 'LevelOne','Helvetica Neue',Arial,sans-serif; font-size: 14px; fill: #ffffff; }
    .axis  { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 10px; fill: #9a9a9a; }
    .lbl   { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; fill: #e0e0e0; }
    .big   { font-family: 'LevelOne','Helvetica Neue',Arial,sans-serif; font-size: 26px; fill: #FC9900; }
    .big.cyan { fill: #61B5E5; }
    .small { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 10px; fill: #9a9a9a; }
  </style>

  <text x="24" y="28" class="title">moof overhead per 250-fragment group · video_400kbps_avc.mp4</text>

  <!-- Plot region: baseline y=240, top y=80. 160 px = 30 KB. -->
  <line x1="100" y1="240" x2="700" y2="240" stroke="#646464" stroke-width="1"/>

  <!-- Gridlines and axis labels. -->
  <g stroke="#3a3a3a" stroke-width="1" stroke-dasharray="2 4">
    <line x1="100" y1="80"  x2="700" y2="80"/>
    <line x1="100" y1="120" x2="700" y2="120"/>
    <line x1="100" y1="160" x2="700" y2="160"/>
    <line x1="100" y1="200" x2="700" y2="200"/>
  </g>
  <g class="axis">
    <text x="96" y="84"  text-anchor="end">30 KB</text>
    <text x="96" y="124" text-anchor="end">20 KB</text>
    <text x="96" y="164" text-anchor="end">10 KB</text>
    <text x="96" y="204" text-anchor="end"> 5 KB</text>
    <text x="96" y="244" text-anchor="end">     0</text>
  </g>

  <!-- CMAF bar: 26 040 B → 136 px tall, top at y=104, base at y=240. -->
  <rect x="180" y="104" width="180" height="136" rx="4" fill="#FC9900"/>
  <text x="270" y="268" class="big" text-anchor="middle">26 040</text>
  <text x="270" y="288" class="lbl" text-anchor="middle">CMAF moof bytes</text>
  <text x="270" y="304" class="small" text-anchor="middle">~100 B × 250 + 8 B mdat headers</text>

  <!-- LOCMAF sliver: 592 B → 3 px tall sitting on the baseline. -->
  <rect x="440" y="237" width="180" height="3" rx="1.5" fill="#61B5E5"/>
  <text x="530" y="268" class="big cyan" text-anchor="middle">592</text>
  <text x="530" y="288" class="lbl" text-anchor="middle">LOCMAF wire bytes</text>
  <text x="530" y="304" class="small" text-anchor="middle">19 B full + 2.3 B average delta</text>

  <!-- 45:1 callout to the right of the bars. -->
  <g transform="translate(630,150)">
    <rect x="0" y="0" width="110" height="60" rx="10" fill="#1f1f1f" stroke="#61B5E5" stroke-width="2"/>
    <text x="55" y="34" font-family="'LevelOne','Helvetica Neue',Arial,sans-serif" font-size="26" fill="#61B5E5" text-anchor="middle">45 : 1</text>
    <text x="55" y="52" class="small" text-anchor="middle">compression</text>
  </g>

  <!-- Footer note. -->
  <text x="24" y="328" class="small">Source: <tspan fill="#d0d0d0">go run ./cmd/locmaf roundtrip -verbose</tspan> · 250 fragments × 1 sample each · AVC video, no B-frames</text>
</svg>
